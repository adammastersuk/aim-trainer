<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aim Trainer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card intro-card">
        <div class="intro-top-row">
          <a class="back-link" href="https://builds.adammasters.co.uk" target="_blank" rel="noreferrer">← Back to Builds</a>
          <button id="theme-toggle-btn" class="button ghost" type="button" aria-label="Toggle light and dark mode">
            Toggle Theme
          </button>
        </div>

        <h1>Aim Trainer</h1>
        <p>Click targets fast, stay accurate, and post your best 30-second run.</p>

        <div class="actions">
          <button id="start-btn">Start 30s Run</button>
          <button id="restart-btn" disabled>Restart</button>
          <button id="toggle-leaderboard-btn" class="button ghost">View Leaderboard</button>
        </div>
      </section>

      <section class="card">
        <div class="kv">
          <div class="kv-item"><span class="kv-label">Time Left</span><span id="time-left" class="kv-value">30.0s</span></div>
          <div class="kv-item"><span class="kv-label">Hits</span><span id="hits" class="kv-value">0</span></div>
          <div class="kv-item"><span class="kv-label">Misses</span><span id="misses" class="kv-value">0</span></div>
          <div class="kv-item"><span class="kv-label">Score</span><span id="live-score" class="kv-value">0</span></div>
        </div>
      </section>

      <section class="card">
        <div id="play-area" aria-label="Aim trainer play area">
          <button id="target" aria-label="Target"></button>
          <p id="play-hint">Press start to begin.</p>
        </div>
      </section>

      <section id="result-card" class="card hidden">
        <h2>Game Over</h2>
        <div id="result-grid" class="kv"></div>
        <form id="submit-form" class="submit-form" autocomplete="off">
          <label for="player-name">Name</label>
          <input id="player-name" name="name" maxlength="20" required placeholder="Player" />
          <button id="submit-btn" type="submit">Submit Score</button>
          <p id="submit-message" aria-live="polite"></p>
        </form>
      </section>

      <section id="leaderboard-card" class="card hidden-on-mobile">
        <h2>Leaderboard</h2>
        <div id="leaderboard-empty" class="hidden"><p>No runs yet. Be the first to submit.</p></div>
        <div class="table-wrap">
          <table id="leaderboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Score</th>
                <th>Hits</th>
                <th>Misses</th>
                <th>Accuracy</th>
                <th>Avg Reaction</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
